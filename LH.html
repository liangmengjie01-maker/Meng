<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<!-- ✅ 微信 & 手机适配关键 -->
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>❤️ 给你的爱</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont,
      "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  }

  .item {
    position: absolute;
    color: #fff;
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 13px;        /* 📱 手机更合适 */
    white-space: nowrap;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .show {
    opacity: 1;
    transform: scale(1);
  }
</style>
</head>

<body>

<script>
  /*********************
   * 祝福语
   *********************/
  const messages = [
    "我喜欢你","❤️","遇见你真好","你很重要","想你了",
    "世界因你温柔","Love U","Always with you","愿你天天开心",
    "你是我的偏爱","希望你被温柔以待","今天也要笑呀",
    "万事顺遂","你值得所有美好","平安喜乐","未来可期",
    "你是光","一切都会更好","不止今天喜欢你",
    "你是独一无二的","愿幸福围绕你","记得照顾自己",
    "你让我心动","你是人间浪漫","为你而来",
    "温柔且坚定","愿你所愿皆所得","你真的很好",
    "你在 就很好","生活因你闪光",
    "愿快乐常伴你左右","愿岁月温柔",
    "所有美好都给你","请保持快乐"
  ];

  /*********************
   * 爱心公式
   *********************/
  function heart(t) {
    return {
      x: 16 * Math.pow(Math.sin(t), 3),
      y:
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t)
    };
  }

  /*********************
   * 📱 手机竖屏参数
   *********************/
  const total = 140;                // 点数略微减少 → 更紧凑
  const scale = Math.min(
    window.innerWidth / 25,
    window.innerHeight / 40
  );

  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight * 0.45; // ❤️ 向上偏一点更好看

  /*********************
   * 逐个生成
   *********************/
  for (let i = 0; i < total; i++) {
    setTimeout(() => {
      const t = (2 * Math.PI / total) * i;
      const p = heart(t);

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = messages[i % messages.length];

      // 🌈 微信安全的渐变色
      div.style.background =
        `hsl(${(i * 360) / total}, 80%, 60%)`;  

      div.style.left = centerX + p.x * scale + "px";
      div.style.top = centerY - p.y * scale + "px";

      document.body.appendChild(div);

      requestAnimationFrame(() => {
        div.classList.add("show");
      });
    }, i * 45);   // 📱 弹出节奏更舒服
  }
</script>

</body>
</html>
